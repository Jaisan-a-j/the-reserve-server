name: Backend Docker CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            jaisanaj/the-reserve-backend:latest
            jaisanaj/the-reserve-backend:${{ github.sha }}

      - name: Trigger Render Deployment
        env:
          DEPLOY_URL: ${{ secrets.BACKEND_DEPLOY_HOOK }}
        run: |
          echo "Notifying Render to pull the latest backend image from Docker Hub..."
          curl -f "$DEPLOY_URL"
