name: Backend Docker CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Points to the package-lock inside your backend folder
          cache-dependency-path: "./backend/package-lock.json"

      # --- PHASE 2: DOCKER BUILD & PUSH ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Compiles everything inside your backend subfolder
          file: ./backend/Dockerfile # Targets your backend Dockerfile
          push: true
          tags: |
            jaisanaj/the-reserve-backend:latest
            jaisanaj/the-reserve-backend:${{ github.sha }}
